name: Build Repo Public

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建方式'
        required: true
        type: choice
        options:
          - cxfreeze
          - nuitka
        default: 'nuitka'
      target_platform:
        description: '目标平台'
        required: true
        type: choice
        options:
          - windows
          - linux
          - macos
          - all
        default: 'all'

jobs:
  # ============================================================
  # 统一前端构建（只构建一次，供所有平台后端使用）
  # ============================================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: FrontPages/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd FrontPages
        npm install

    - name: Build frontend
      run: |
        cd FrontPages
        npx vite build --outDir ../BuildCache/frontend --emptyOutDir

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
        retention-days: 1

  # ============================================================
  # cx-Freeze Windows
  # ============================================================
  build-cxfreeze-windows:
    needs: build-frontend
    runs-on: windows-latest
    if: inputs.build_type == 'cxfreeze' && (inputs.target_platform == 'windows' || inputs.target_platform == 'all')
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install cx_Freeze
    
    - name: Build with cx-Freeze
      run: |
        python AllBuilder\build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-freeze-winnt-x64
        path: BuildCache/cxfreeze
        retention-days: 30

  # ============================================================
  # cx-Freeze Linux
  # ============================================================
  build-cxfreeze-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: inputs.build_type == 'cxfreeze' && (inputs.target_platform == 'linux' || inputs.target_platform == 'all')
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install cx_Freeze
    
    - name: Build with cx-Freeze
      run: |
        python ./AllBuilder/build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-freeze-linux-x64
        path: BuildCache/cxfreeze
        retention-days: 30

  # ============================================================
  # Nuitka Windows
  # ============================================================
  build-nuitka-windows:
    needs: build-frontend
    runs-on: windows-latest
    if: inputs.build_type == 'nuitka' && (inputs.target_platform == 'windows' || inputs.target_platform == 'all')
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install nuitka
    
    - name: Build with Nuitka
      run: |
        python .\AllBuilder\build_nuitkaui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-nuitka-winnt-x64
        path: BuildCache/nuitka
        retention-days: 30

  # ============================================================
  # Nuitka Linux
  # ============================================================
  build-nuitka-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: inputs.build_type == 'nuitka' && (inputs.target_platform == 'linux' || inputs.target_platform == 'all')
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential patchelf
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install nuitka
    
    - name: Build with Nuitka
      run: |
        python ./AllBuilder/build_nuitkaui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-nuitka-linux-x64
        path: BuildCache/nuitka
        retention-days: 30
