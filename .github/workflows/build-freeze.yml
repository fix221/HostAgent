name: Build with Freeze

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
      target_platform:
        description: '目标平台'
        required: true
        type: choice
        options:
          - windows
          - linux
          - macos
          - all
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: choice
        options:
          - yes
          - no
        default: 'yes'
  workflow_call:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
        default: ''
      target_platform:
        description: '目标平台'
        required: true
        type: string
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: string
        default: 'yes'

jobs:
  # ============================================================
  # 统一前端构建（只构建一次，供所有平台后端使用）
  # ============================================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: FrontPages/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd FrontPages
        npm install

    - name: Build frontend
      run: |
        cd FrontPages
        npx vite build --outDir ../BuildCache/frontend --emptyOutDir

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
        retention-days: 1

  # ============================================================
  # Windows 后端构建
  # ============================================================
  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    if: inputs.target_platform == 'windows' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install pywin32 pythonnet
        pip install cx_Freeze

    - name: Build with cx-Freeze
      run: |
        python AllBuilder\build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"

    # ── 签名：安装 SimplySign Desktop（仅 beta/release）────────────────
    - name: Setup Certum Code Signing
      if: inputs.version != 'alpha'
      shell: bash
      run: |
        chmod +x ./.github/scripts/install-simplysign.sh
        ./.github/scripts/install-simplysign.sh
        powershell -ExecutionPolicy Bypass -File "./.github/scripts/configure-simplysign-registry.ps1"
      continue-on-error: true

    # ── 签名：认证 SimplySign ─────────────────────────────────────────
    - name: Authenticate Certum
      if: inputs.version != 'alpha'
      shell: bash
      env:
        CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
        CERTUM_USERNAME: ${{ secrets.CERTUM_USERNAME }}
        CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        CERTUM_EXE_PATH: ${{ secrets.CERTUM_EXE_PATH }}
      run: |
        for attempt in $(seq 1 10); do
          echo "Authentication attempt ${attempt}/10"
          if powershell -ExecutionPolicy Bypass -File "./.github/scripts/connect-simplySign-enhanced.ps1"; then
            echo "Authentication completed"
            exit 0
          fi
          [ "$attempt" -lt 10 ] && sleep 10
        done
        echo "ERROR: Certum authentication failed after 10 attempts"
        exit 1
      continue-on-error: true

    # ── 签名：对构建产物签名 ──────────────────────────────────────────
    - name: Sign Windows binaries
      if: inputs.version != 'alpha'
      shell: pwsh
      env:
        CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
      run: |
        Start-Sleep -Seconds 10
        powershell -ExecutionPolicy Bypass -File "./.github/scripts/sign-windows.ps1" -TargetDirectory "BuildCache/cxfreeze" -SkipCatGeneration

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenIDCS-Client-cxfreeze-Windows
        path: BuildCache/cxfreeze
        retention-days: 30

  # ============================================================
  # Linux 后端构建
  # ============================================================
  build-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: inputs.target_platform == 'linux' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install cx_Freeze

    - name: Build with cx-Freeze
      run: |
        python ./AllBuilder/build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenIDCS-Client-cxfreeze-Linux
        path: BuildCache/cxfreeze
        retention-days: 30

  # ============================================================
  # macOS 后端构建
  # ============================================================
  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    if: inputs.target_platform == 'macos' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install cx_Freeze

    - name: Build with cx-Freeze
      run: |
        python ./AllBuilder/build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenIDCS-Client-cxfreeze-macOS
        path: BuildCache/cxfreeze
        retention-days: 30

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: inputs.create_release == 'yes'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Package build folders
      run: |
        tar -czf OpenIDCS-Client-cxfreeze-Windows.tar.gz OpenIDCS-Client-cxfreeze-Windows
        tar -czf OpenIDCS-Client-cxfreeze-Linux.tar.gz OpenIDCS-Client-cxfreeze-Linux
        tar -czf OpenIDCS-Client-cxfreeze-macOS.tar.gz OpenIDCS-Client-cxfreeze-macOS

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.version == 'alpha' && 'alpha' || (inputs.version != '' && format('v{0}', inputs.version) || 'beta') }}
        name: ${{ inputs.version == 'alpha' && 'Alpha Release' || (inputs.version != '' && format('Release v{0}', inputs.version) || 'Beta Release') }}
        files: |
          OpenIDCS-Client-cxfreeze-Windows.tar.gz
          OpenIDCS-Client-cxfreeze-Linux.tar.gz
          OpenIDCS-Client-cxfreeze-macOS.tar.gz
        draft: false
        prerelease: ${{ inputs.version == '' || inputs.version == 'alpha' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
