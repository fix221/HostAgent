  #       name: openidcs-client-freeze-linux-a64
  #       path: BuildCache/openidcs-client-freeze-linux-a64.tar.gz
  #       retention-days: 30

  # ============================================================
  # macOS 后端构建
  # ============================================================
  build-macos-a64:
    needs: build-front-all
    runs-on: macos-latest
    if: inputs.target_platform == 'macos' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install cx_Freeze

    - name: Build with cx-Freeze
      run: |
        python ./AllBuilder/build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-freeze-macos-a64
        path: BuildCache/OpenIDCS-Client-macOS.tar.gz
        retention-days: 30

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    needs: [build-winnt-x64, build-linux-x64, build-macos-a64]
    runs-on: ubuntu-latest
    if: always() && inputs.create_release == 'yes' && !cancelled() && !contains(needs.*.result, 'failure')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.version == 'alpha' && 'alpha' || (inputs.version != '' && format('v{0}', inputs.version) || 'beta') }}
        name: ${{ inputs.version == 'alpha' && 'Alpha Release' || (inputs.version != '' && format('Release v{0}', inputs.version) || 'Beta Release') }}
        files: |
          openidcs-client-freeze-winnt-x64/OpenIDCS-Client-Windows.zip
          openidcs-client-freeze-linux-x64/OpenIDCS-Client-Linux.tar.gz
          openidcs-client-freeze-macos-a64/OpenIDCS-Client-macOS.tar.gz
        fail_on_unmatched_files: false
        draft: false
        prerelease: ${{ inputs.version == '' || inputs.version == 'alpha' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
