  # ============================================================
  # Linux 后端构建
  # ============================================================
  build-linux-x64:
    needs: build-front-all
    runs-on: ubuntu-latest
    if: inputs.target_platform == 'linux' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install cx_Freeze

    - name: Build with cx-Freeze
      run: |
        python ./AllBuilder/build_cxfreeze.py build
      env:
        SKIP_FRONTEND_BUILD: "1"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-freeze-linux-x64
        path: BuildCache/OpenIDCS-Client-Linux.tar.gz
        retention-days: 30

