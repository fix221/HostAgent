  # ============================================================
  # macOS 后端构建
  # ============================================================
  build-macos:
    needs: build-front
    runs-on: macos-latest
    if: inputs.target_platform == 'macos' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install nuitka

    - name: Build with Nuitka
      run: |
        python ./AllBuilder/build_nuitkaui.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-nuitka-macos-a64
        path: BuildCache/nuitka
        retention-days: 30

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    needs: [build-winnt, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: inputs.create_release == 'yes'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Package build folders
      run: |
        if [ -d "openidcs-client-nuitka-winnt-x64" ]; then
          tar -czf openidcs-client-nuitka-winnt-x64.tar.gz openidcs-client-nuitka-winnt-x64
        fi
        if [ -d "openidcs-client-nuitka-linux-x64" ]; then
          tar -czf openidcs-client-nuitka-linux-x64.tar.gz openidcs-client-nuitka-linux-x64
        fi
        if [ -d "openidcs-client-nuitka-macos-a64" ]; then
          tar -czf openidcs-client-nuitka-macos-a64.tar.gz openidcs-client-nuitka-macos-a64
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.version != '' && format('v{0}', inputs.version) || 'beta' }}
        name: ${{ inputs.version != '' && format('Release v{0}', inputs.version) || 'Beta Release' }}
        files: |
          openidcs-client-nuitka-winnt-x64.tar.gz
          openidcs-client-nuitka-linux-x64.tar.gz
          openidcs-client-nuitka-macos-a64.tar.gz
        draft: false
        prerelease: ${{ inputs.version == '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
