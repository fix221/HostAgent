name: Build with Nuitka

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
      target_platform:
        description: '目标平台'
        required: true
        type: choice
        options:
          - windows
          - linux
          - macos
          - all
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: choice
        options:
          - yes
          - no
        default: 'yes'
  workflow_call:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
        default: ''
      target_platform:
        description: '目标平台'
        required: true
        type: string
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: string
        default: 'yes'

jobs:
  # ============================================================
  # 统一前端构建（只构建一次，供所有平台后端使用）
  # ============================================================
  build-front:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: FrontPages/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd FrontPages
        npm install

    - name: Build frontend
      run: |
        cd FrontPages
        npx vite build --outDir ../BuildCache/frontend --emptyOutDir

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
        retention-days: 1

  # ============================================================
  # Windows 后端构建
  # ============================================================
  build-winnt:
    needs: build-front
    runs-on: windows-latest
    if: inputs.target_platform == 'windows' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install pywin32 pythonnet
        pip install nuitka

    - name: Build with Nuitka
      run: |
        python .\AllBuilder\build_nuitkaui.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-nuitka-winnt-x64
        path: BuildCache/nuitka
        retention-days: 30

  # ============================================================
  # Linux 后端构建
  # ============================================================
  build-linux:
    needs: build-front
    runs-on: ubuntu-latest
    if: inputs.target_platform == 'linux' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install nuitka

    - name: Build with Nuitka
      run: |
        python ./AllBuilder/build_nuitkaui.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-nuitka-linux-x64
        path: BuildCache/nuitka
        retention-days: 30

