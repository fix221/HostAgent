  #
  #   - name: Upload artifact
  #     uses: actions/upload-artifact@v4
  #     with:
  #       name: openidcs-client-pyinst-linux-a64
  #       path: BuildCache/pyinstaller/openidcs-client
  #       retention-days: 30

  # ============================================================
  # macOS 构建
  # ============================================================
  build-macos:
    needs: build-front
    runs-on: macos-latest
    if: inputs.target_platform == 'macos' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install pyinstaller

    - name: Build with PyInst
      run: |
        python ./AllBuilder/build_pyinstaller.py
      env:
        SKIP_FRONTEND_BUILD: "1"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-pyinst-macos-a64
        path: BuildCache/pyinstaller/openidcs-client
        retention-days: 30

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    needs: [build-winnt, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: inputs.create_release == 'yes'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Prepare release files
      run: |
        mkdir -p release
        # Windows: 打包为 tar.gz
        if [ -d "openidcs-client-pyinst-winnt-x64" ]; then
          cd openidcs-client-pyinst-winnt-x64
          tar -czf ../release/openidcs-client-pyinst-winnt-x64.tar.gz openidcs-client.exe
          cd ..
        fi
        # Linux: 打包为 tar.gz
        if [ -d "openidcs-client-pyinst-linux-x64" ]; then
          cd openidcs-client-pyinst-linux-x64
          chmod +x openidcs-client
          tar -czf ../release/openidcs-client-pyinst-linux-x64.tar.gz openidcs-client
          cd ..
        fi
        # macOS: 打包为 tar.gz
        if [ -d "openidcs-client-pyinst-macos-a64" ]; then
          cd openidcs-client-pyinst-macos-a64
          chmod +x openidcs-client
          tar -czf ../release/openidcs-client-pyinst-macos-a64.tar.gz openidcs-client
          cd ..
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.version == 'alpha' && 'alpha' || (inputs.version != '' && format('v{0}', inputs.version) || 'beta') }}
        name: ${{ inputs.version == 'alpha' && 'Alpha Release' || (inputs.version != '' && format('Release v{0}', inputs.version) || 'Beta Release') }}
        files: |
          release/openidcs-client-pyinst-winnt-x64.tar.gz
          release/openidcs-client-pyinst-linux-x64.tar.gz
          release/openidcs-client-pyinst-macos-a64.tar.gz
        draft: false
        prerelease: ${{ inputs.version == '' || inputs.version == 'alpha' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
