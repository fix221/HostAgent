name: Build with PyInst

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
      target_platform:
        description: '目标平台'
        required: true
        type: choice
        options:
          - windows
          - linux
          - macos
          - all
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: choice
        options:
          - yes
          - no
        default: 'yes'
  workflow_call:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
        default: ''
      target_platform:
        description: '目标平台'
        required: true
        type: string
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: string
        default: 'yes'

jobs:
  # ============================================================
  # 统一前端构建（只构建一次，供所有平台后端使用）
  # ============================================================
  build-front:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: FrontPages/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd FrontPages
        npm install

    - name: Build frontend
      run: |
        cd FrontPages
        npx vite build --outDir ../BuildCache/frontend --emptyOutDir

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend
        retention-days: 1

  # ============================================================
  # Windows 构建
  # ============================================================
  build-winnt:
    needs: build-front
    runs-on: windows-latest
    if: inputs.target_platform == 'windows' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install pywin32 pythonnet
        pip install pyinstaller

    - name: Build with PyInst
      run: |
        python AllBuilder\build_pyinstaller.py
      env:
        SKIP_FRONTEND_BUILD: "1"

    # ── 签名：安装 SimplySign Desktop（仅 beta/release）────────────────
    - name: Setup Certum Code Signing
      if: inputs.version != 'alpha'
      shell: bash
      run: |
        chmod +x ./.github/scripts/install-simplysign.sh
        ./.github/scripts/install-simplysign.sh
        powershell -ExecutionPolicy Bypass -File "./.github/scripts/configure-simplysign-registry.ps1"
      continue-on-error: true

    # ── 签名：认证 SimplySign ─────────────────────────────────────────
    - name: Authenticate Certum
      if: inputs.version != 'alpha'
      shell: bash
      env:
        CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
        CERTUM_USERNAME: ${{ secrets.CERTUM_USERNAME }}
        CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
        CERTUM_EXE_PATH: ${{ secrets.CERTUM_EXE_PATH }}
      run: |
        for attempt in $(seq 1 10); do
          echo "Authentication attempt ${attempt}/10"
          if powershell -ExecutionPolicy Bypass -File "./.github/scripts/connect-simplySign-enhanced.ps1"; then
            echo "Authentication completed"
            exit 0
          fi
          [ "$attempt" -lt 10 ] && sleep 10
        done
        echo "ERROR: Certum authentication failed after 10 attempts"
        exit 1
      continue-on-error: true

    # ── 签名：对构建产物签名 ──────────────────────────────────────────
    - name: Sign Windows binary
      if: inputs.version != 'alpha'
      shell: pwsh
      env:
        CERTUM_CERTIFICATE_SHA1: ${{ secrets.CERTUM_CERTIFICATE_SHA1 }}
      run: |
        Start-Sleep -Seconds 10
        powershell -ExecutionPolicy Bypass -File "./.github/scripts/sign-windows.ps1" -TargetDirectory "BuildCache/pyinstaller" -SkipCatGeneration

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-pyinst-winnt-x64
        path: BuildCache/pyinstaller/openidcs-client.exe
        retention-days: 30

  # ============================================================
  # Windows x86 构建（暂未启用）
