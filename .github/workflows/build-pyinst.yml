  #       path: BuildCache/pyinstaller/openidcs-client.exe
  #       retention-days: 30

  # ============================================================
  # Linux 构建
  # ============================================================
  build-linux:
    needs: build-front
    runs-on: ubuntu-latest
    if: inputs.target_platform == 'linux' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: BuildCache/frontend

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r HostConfig/pipinstall.txt
        pip install pyinstaller

    - name: Build with PyInst
      run: |
        python ./AllBuilder/build_pyinstaller.py
      env:
        SKIP_FRONTEND_BUILD: "1"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openidcs-client-pyinst-linux-x64
        path: BuildCache/pyinstaller/openidcs-client
        retention-days: 30

