name: Build Repo Proxys

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (留空则发布到 Beta)'
        required: false
        type: string
      target_platform:
        description: '目标平台'
        required: true
        type: choice
        options:
          - windows
          - linux
          - macos
          - all
        default: 'all'
      create_release:
        description: '是否创建 Release'
        required: true
        type: choice
        options:
          - yes
          - no
        default: 'yes'

jobs:
  build-winnt-x64:
    runs-on: windows-latest
    if: inputs.target_platform == 'windows' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build VNC Proxy
      run: |
        cd AllBuilder
        python build_vncproxy.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VNCProxy-Windows
        path: BuildCache/websockify/dist/websocketproxy.exe
        retention-days: 30

  build-linux-x64:
    runs-on: ubuntu-latest
    if: inputs.target_platform == 'linux' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential patchelf
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build VNC Proxy
      run: |
        cd AllBuilder
        python build_vncproxy.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VNCProxy-Linux
        path: BuildCache/websockify/dist/websocketproxy
        retention-days: 30

  build-macos-a64:
    runs-on: macos-latest
    if: inputs.target_platform == 'macos' || inputs.target_platform == 'all'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        brew install patchelf
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build VNC Proxy
      run: |
        cd AllBuilder
        python build_vncproxy.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VNCProxy-Mac
        path: BuildCache/websockify/dist/websocketproxy
        retention-days: 30

